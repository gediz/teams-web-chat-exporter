name: Feature request
description: Suggest something new or improved.
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What would you like?
      description: One or two sentences.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case — what you were trying to do when you wished this existed.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: How might it work?
      description: Rough sketch of the UI/behavior. Not required — text is fine.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Workarounds you've tried, other extensions that do it, etc.
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
    validations:
      required: false
