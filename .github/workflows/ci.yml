name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Node 24 LTS bundles npm 11 — matches the version that generated
      # package-lock.json, no global upgrade needed.
      - run: npm --version
      - run: npm ci
      - run: npm run check
      - run: npm run build
