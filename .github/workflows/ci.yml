name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Node 22 ships with npm 10.x; upgrade to npm 11 to match the
      # version that generated package-lock.json (avoids "Missing from lock file" errors)
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run check
      - run: npm run build
