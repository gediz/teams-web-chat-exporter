name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      # pnpm is the package manager of record for this repo (see
      # pnpm-lock.yaml). Set it up before Node so setup-node's
      # `cache: pnpm` can resolve the correct pnpm store path. The version
      # is read from the packageManager field in package.json (pnpm@10.23.0),
      # the single source of truth, so no `version:` here.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4.3.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # --frozen-lockfile is the CI equivalent of `npm ci`: fail if
      # pnpm-lock.yaml is out of sync with package.json rather than
      # silently regenerating it.
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      # Both targets, always: Chrome MV3 and Firefox MV2 have separate
      # build outputs and some APIs differ between them, so a green
      # Chrome build alone doesn't prove Firefox still compiles.
      - run: pnpm build
      - run: pnpm build:firefox
